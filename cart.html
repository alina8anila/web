<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Кошик покупок</title>
    <link rel="stylesheet" href="styles.css">
    <script src="cart.js" defer></script>
</head>
  <div class="badge">
    <span class="badge-front">BuyList</span>
    <span class="badge-back">Created by:<br>Alina Parashchiy</span>
  </div>
  <body>
    <main class="cart">
      <section class="add">
        <label>Назва товару
          <input type="text" name="Назва товару">
        </label>
        <button data-tooltip="Додати товар" class="butadd" type="submit" >Додати</button>
        
        <ul class=list>
          <li>
            <label>Дрон</label>
            <span class="qty">1</span>
            <button>Не куплено</button>
          </li>
          <li>
            <label>Танк</label>
            <button data-tooltip="Зменшити кількість" type="button" class="btn-minus">−</button>
            <span class="qty">2</span>
            <button data-tooltip="Збільшити кількість" type="button" class="btn-plus">+</button>
            <button >Куплено</button>
            <button data-tooltip="Видалити товар" type="reset">×</button>
          </li>
          <li>
            <label>Гармата</label>
            <button data-tooltip="Зменшити кількість" type="button" class="btn-minus">−</button>
            <span class="qty">3</span>
            <button data-tooltip="Збільшити кількість" type="button" class="btn-plus">+</button>
            <button>Куплено</button>
            <button data-tooltip="Видалити товар" type="reset">×</button>
          </li>
        </ul>
      </section>

      <aside class="summary">
        <section>
          <h2>Залишилося</h2>
            <ul>
              <li>Танк<span class="number">2</span></li>
              <li>Гармата<span class="number">3</span></li>
            </ul>
        </section>
        <section>
          <h2>Куплено</h2>
          <ul>
            <li>Дрон<span class="number">1</span></li>
          </ul>
        </section>
      </aside>

    </main>
  </body>
</html>
